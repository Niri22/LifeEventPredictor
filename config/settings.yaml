data_generation:
  num_users: 2000
  months: 18
  start_date: "2024-07-01"
  seed: 42

  persona_weights:
    baseline: 0.40
    aspiring_affluent: 0.20
    sticky_family_leader: 0.20
    generation_nerd: 0.20

  income_brackets:
    low: [40000, 65000]
    mid: [65000, 120000]
    high: [120000, 250000]
    ultra: [250000, 500000]

  aua_ranges:
    aspiring_affluent: [50000, 99999]
    sticky_family_leader: [100000, 499999]
    generation_nerd: [500000, 1500000]
    baseline: [5000, 49999]

  txns_per_day_lambda: 3
  signal_onset_buffer_months: 4  # earliest onset is 4 months into the window

persona_thresholds:
  aspiring_affluent_min: 50000
  aspiring_affluent_max: 100000
  sticky_family_leader_min: 100000
  sticky_family_leader_max: 500000
  generation_nerd_min: 500000

products:
  aspiring_affluent:
    code: "RRSP_LOAN"
    name: "Retirement Accelerator (RRSP Loan)"
    display_name: "Momentum Builder"
    description: "Leverage unused RRSP room to leapfrog into Premium status"

  sticky_family_leader:
    code: "SUMMIT_PORTFOLIO"
    name: "Summit Portfolio (Private Equity) + WS Credit Card"
    display_name: "Full-Stack Client"
    description: "Access institutional-grade private equity with liquidity monitoring"

  generation_nerd:
    code: "AI_RESEARCH_DIRECT_INDEX"
    name: "AI Research Dashboard + Direct Indexing + Private Credit"
    display_name: "Legacy Architect"
    description: "Institutional-grade analysis with automated tax-loss harvesting"

model:
  test_size: 0.2
  random_state: 42
  confidence_threshold: 0.65
  precision_target: 0.80

# Experimentation layer: treatment/control assignment, outcome simulation, pathway metrics, reweighting
experiment:
  treatment_ratio: 0.8
  min_n: 30
  observation_window_days: 90
  experiment_version: "v1"
  allow_products:
    - RRSP_LOAN
    - SUMMIT_PORTFOLIO
    - AI_RESEARCH_DIRECT_INDEX
  allow_governance_tiers:
    - green
    - amber
  uplift_weights:
    conversion_uplift: 0.30
    delta_aua_uplift_scale: 10000.0   # divide delta_aua by this before weighting
    delta_aua_weight: 0.25
    liquidity_uplift_weight: 0.20
    retention_uplift_weight: 0.20
    complaint_uplift_weight: -0.05   # negative: more complaints = lower score
  clamp_bounds:
    uplift_weight_min: -0.25
    uplift_weight_max: 0.20
  safety_thresholds:
    retention_uplift_min: -0.05   # if retention_uplift < this, trigger safety
    complaint_uplift_max: 0.03    # if complaint_uplift > this, trigger safety
    liquidity_uplift_min: -0.10   # if liquidity_uplift < this, trigger safety
  # Pathway-level true effects (persona_tier|signal|product_code) for simulation
  effects:
    aspiring_affluent|leapfrog_ready|RRSP_LOAN:
      conversion_lift: 0.06
      aua_lift: 2500
      liquidity_months_lift: 0.4
      retention_lift: 0.01
      complaint_lift: 0.002
    sticky_family_leader|liquidity_warning|SUMMIT_PORTFOLIO:
      conversion_lift: 0.04
      aua_lift: 1800
      liquidity_months_lift: 0.2
      retention_lift: 0.02
      complaint_lift: 0.001
    generation_nerd|harvest_opportunity|AI_RESEARCH_DIRECT_INDEX:
      conversion_lift: 0.05
      aua_lift: 3200
      liquidity_months_lift: 0.1
      retention_lift: 0.015
      complaint_lift: 0.001
  seed: 42
